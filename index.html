<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UFMT | Aproveitamento de Estudos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="main-header">
  <div class="header-container">
    <div class="brand">
      <h1>UFMT</h1>
      <span>Aproveitamento de Estudos</span>
    </div>
    <div class="actions">
      <button onclick="gerarPDF()" class="btn-pdf">📄 Gerar Requerimento (PDF)</button>
    </div>
  </div>
</header>

<main class="container">
  <!-- Identificação do Processo -->
  <section class="card info-sei">
    <h3>Identificação do Processo</h3>
    <div class="grid-inputs">
      <div class="field">
        <label>Número do Processo SEI</label>
        <input type="text" id="processoSEI" placeholder="23108.XXXXXX/XXXX-XX" oninput="salvarProgresso()">
      </div>
    </div>
  </section>

  <!-- Lista de Disciplinas -->
  <div id="disciplinas-container">
    <!-- O JS injetará o primeiro card aqui -->
  </div>

  <div class="form-footer">
    <button onclick="addDisciplina()" class="btn-add">+ Adicionar Outra Disciplina</button>
    <button onclick="limparFormulario()" class="btn-reset">Limpar Tudo</button>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="script.js"></script>
</body>
</html>
